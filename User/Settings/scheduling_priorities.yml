# Scheduling Priorities - Determines weight of each factor in importance calculation
# Higher Rank = More influence on final importance score
# Order = Display/processing order (1 = first considered)
# =============================================================================

Scheduling_Priorities:
  - Name: Environment
    Order: 1
    Rank: 7
    Description: Hard gate - considers current place, tools, and inventory.
  - Name: Category
    Order: 2
    Rank: 6
    Description: Life priorities from Category_Settings.
  - Name: Happiness
    Order: 3
    Rank: 5
    Description: Map of Happiness alignment - your north star values.
  - Name: Due Date
    Order: 4
    Rank: 4
    Description: Prioritizes items with approaching due dates.
  - Name: Deadline
    Order: 5
    Rank: 5
    Description: Prioritizes items with approaching hard deadlines.
  - Name: Status Alignment
    Order: 6
    Rank: 6
    Description: Matches items to current energy, focus, and emotional states.
  - Name: Priority Property
    Order: 7
    Rank: 2
    Description: Uses the item's explicit Priority property.
  - Name: Template Membership
    Order: 8
    Rank: 1
    Description: Structural bonus for nested routines.
