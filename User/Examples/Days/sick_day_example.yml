name: Sick Day (Example)
type: day
description: Recovery-first template for illness days; strips work to essentials.
category: Health
duration: 24h
place: at_home
status_requirements:
  place:
    - at_home
  health:
    - poor
    - critical
  energy:
    - low
    - exhausted
children:
  - type: microroutine
    name: Sick Day Care Stack (Example)
  - type: task
    name: Rest Block 90 (Example)
  - type: task
    name: Power Nap Reset (Example)
  - type: routine
    name: Pilot Landing Routine (Example)
sequence:
  - name: Recovery Window Morning (Example)
    type: microroutine
    window: true
    start: "09:00"
    end: "12:00"
    filters:
      tags:
        - sick_day
        - recovery
  - name: Recovery Window Afternoon (Example)
    type: microroutine
    window: true
    start: "14:00"
    end: "17:00"
    filters:
      tags:
        - sick_day
        - recovery
notes: >
  Trigger by setting status to `health:poor` or `health:critical`, then run
  `today reschedule`.
