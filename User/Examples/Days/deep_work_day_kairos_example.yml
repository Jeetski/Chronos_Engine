name: Deep Work Day Kairos (Example)
type: day
description: Weekday template with explicit focus/admin windows and recovery hooks.
category: Work
duration: 24h
place: at_work
days:
  - monday
  - tuesday
  - wednesday
  - thursday
  - friday
status_requirements:
  place:
    - at_work
  focus:
    - good
    - laser
children:
  - type: routine
    name: Pilot Takeoff Routine (Example)
  - type: timeblock
    name: Focus Buffer 15 (Example)
    subtype: buffer
    duration: 15
    absorbable: true
  - type: subroutine
    name: Admin Sweep Container (Example)
  - type: routine
    name: Pilot Landing Routine (Example)
sequence:
  - name: Focus Window A (Example)
    type: microroutine
    window: true
    start: "09:00"
    end: "11:30"
    filters:
      tags:
        - pilot_focus
  - name: Admin Window (Example)
    type: microroutine
    window: true
    start: "14:00"
    end: "15:30"
    filters:
      tags:
        - pilot_admin
notes: >
  Showcases window scheduling, status-aware routine variants, and dedicated
  admin containment.
