name: Focus Rhythm Commitment (Example)
type: commitment
description: Complete at least four focus sprints each week.
status: active
rule:
  kind: frequency
  times: 4
  period: week
targets:
  - type: task
    name: Focus Sprint 90 (Example)
triggers:
  on_met:
    - type: reward
      name: Adventure Break Reward (Example)
  on_violation:
    - type: script
      path: scripts/commitments/miss_example.chs
totals:
  minutes: 0
  sessions: 0


