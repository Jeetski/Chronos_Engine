name: Travel Day (Example)
type: day
description: Travel logistics, buffers, and recovery-focused agenda.
category: Personal Development
duration: 24h
place: travel
status_requirements:
  place:
    - travel
children:
  - type: task
    name: Confirm Flight Check-In
  - type: task
    name: Secure Travel Documents
  - type: task
    name: Pack Carry-On Essentials
  - type: task
    name: Charge Devices Before Departure
  - type: task
    name: Home Shutdown Before Departure
  - type: task
    name: Airport Buffer Arrival
  - type: task
    name: Lodging Check-In and Reset
  - type: task
    name: Travel Expense Capture
  - type: task
    name: Jet Lag Recovery Walk
sequence:
  - name: Transit Window Morning (Example)
    type: microroutine
    window: true
    start: "06:00"
    end: "10:00"
    filters:
      tags:
        - travel
        - logistics
  - name: Arrival Window Evening (Example)
    type: microroutine
    window: true
    start: "18:00"
    end: "21:00"
    filters:
      tags:
        - travel
        - arrival
        - recovery
notes: >
  Built for departure/arrival days. Set place to `travel` before
  `today reschedule`.
