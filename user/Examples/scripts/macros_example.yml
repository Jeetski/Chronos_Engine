# Example macros config. Copy to user/scripts/Macros/macros.yml to activate (without overwriting your own).
enable_macros: true
default_timeout_ms: 12000

before_command:
  today:
    - chs: user/scripts/Macros/status_seed_example.chs
  new:
    - cli: ["echo", "Creating @args0 '@args1'"]
  "*":
    - setvar: { name: last_cmd, value: "@cmd @args0 @args1" }

after_command:
  today:
    - chs: user/scripts/Macros/reschedule_digest_example.chs
  complete:
    - chs: user/scripts/Macros/reward_check_example.chs
  mark:
    - chs: user/scripts/Macros/reward_check_example.chs
  timer:
    - chs: user/scripts/Macros/timer_log_example.chs
  sequence:
    - chs: user/scripts/Macros/sequence_digest_example.chs
  milestone:
    - chs: user/scripts/Macros/milestone_nudge_example.chs
  commitments:
    - chs: user/scripts/Macros/commitments_digest_example.chs
  "*":
    - chs: user/scripts/Macros/command_log_example.chs

