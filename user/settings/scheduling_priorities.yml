# Scheduling Priorities
# =====================
# This file should only contain factors that still make sense as weighted
# priorities in Kairos v2.
#
# These are not hard constraints or structural rules.
# They are the remaining ranked influences among already-valid options.

Scheduling_Priorities:
  - Name: Category
    Order: 1
    Rank: 6
    Description: Life-domain importance from Category_Settings.
  - Name: Happiness
    Order: 2
    Rank: 4
    Description: Alignment with the Map of Happiness.
  - Name: Due Date
    Order: 3
    Rank: 4
    Description: Rising urgency as a completion boundary approaches.
  - Name: Deadline
    Order: 4
    Rank: 5
    Description: Rising urgency as a harder completion boundary approaches.
  - Name: Priority Property
    Order: 5
    Rank: 4
    Description: The item's explicit authored priority.
