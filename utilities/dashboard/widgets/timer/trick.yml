type: widget
name: timer
label: Timer
module: timer
root: widget.timer
elements:
  - name: title
    kind: text
    actions: [get]
  - name: minimize_button
    kind: button
    actions: [click]
  - name: close_button
    kind: button
    actions: [click]
  - name: phase_text
    kind: text
    actions: [get, wait, copy]
  - name: cycle_text
    kind: text
    actions: [get, wait, copy]
  - name: status_text
    kind: text
    actions: [get, wait, copy]
  - name: clock_text
    kind: text
    actions: [get, wait, copy]
  - name: progress_text
    kind: text
    actions: [get, wait, copy]
  - name: block_text
    kind: text
    actions: [get, wait, copy]
  - name: queue_text
    kind: text
    actions: [get, wait, copy]
  - name: confirmation_banner
    kind: container
    actions: [get, wait]
  - name: confirmation_text
    kind: text
    actions: [get, wait, copy]
  - name: confirm_yes_button
    kind: button
    actions: [click]
  - name: confirm_skip_today_button
    kind: button
    actions: [click]
  - name: confirm_later_button
    kind: button
    actions: [click]
  - name: confirm_start_over_button
    kind: button
    actions: [click]
  - name: confirm_stretch_button
    kind: button
    actions: [click]
  - name: profile_select
    kind: select
    actions: [get, set, type, paste]
    value_type: string
  - name: cycles_input
    kind: input
    actions: [get, set, paste]
    value_type: number
  - name: auto_advance_checkbox
    kind: checkbox
    actions: [get, set]
    value_type: boolean
  - name: bind_type_input
    kind: input
    actions: [get, set, type, paste, press]
    value_type: string
  - name: bind_name_input
    kind: input
    actions: [get, set, type, paste, press]
    value_type: string
  - name: start_button
    kind: button
    actions: [click]
  - name: start_day_button
    kind: button
    actions: [click]
  - name: pause_resume_button
    kind: button
    actions: [click]
  - name: cancel_button
    kind: button
    actions: [click]
  - name: refresh_button
    kind: button
    actions: [click]
