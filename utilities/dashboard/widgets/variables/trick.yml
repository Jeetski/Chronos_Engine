type: widget
name: variables
label: Variables
module: variables
root: widget.variables
elements:
  - name: title
    kind: text
    actions: [get]
  - name: minimize_button
    kind: button
    actions: [click]
  - name: close_button
    kind: button
    actions: [click]
  - name: add_button
    kind: button
    actions: [click]
  - name: save_button
    kind: button
    actions: [click]
