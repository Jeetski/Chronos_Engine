type: widget
name: mp3_player
label: MP3 Player
module: mp3_player
root: widget.mp3_player
elements:
  - name: title
    kind: text
    actions: [get]
  - name: minimize_button
    kind: button
    actions: [click]
  - name: close_button
    kind: button
    actions: [click]
  - name: playlist_select
    kind: select
    actions: [get, set, type, paste]
    value_type: string
  - name: refresh_button
    kind: button
    actions: [click]
  - name: play_pause_button
    kind: button
    actions: [click]
  - name: prev_button
    kind: button
    actions: [click]
  - name: next_button
    kind: button
    actions: [click]
  - name: track_title_text
    kind: text
    actions: [get, wait, copy]
  - name: track_artist_text
    kind: text
    actions: [get, wait, copy]
  - name: library_container
    kind: container
    actions: [get, wait, copy]
  - name: playlist_container
    kind: container
    actions: [get, wait, copy]
  - name: status_text
    kind: text
    actions: [get, wait, copy]
