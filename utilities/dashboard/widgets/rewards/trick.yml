type: widget
name: rewards
label: Rewards
module: rewards
root: widget.rewards
elements:
  - name: title
    kind: text
    actions: [get]
  - name: minimize_button
    kind: button
    actions: [click]
  - name: close_button
    kind: button
    actions: [click]
  - name: balance_text
    kind: text
    actions: [get, wait, copy]
  - name: ledger_container
    kind: container
    actions: [get, wait, copy]
  - name: list_toggle_button
    kind: button
    actions: [click]
  - name: list_section
    kind: container
    actions: [get, wait]
  - name: search_input
    kind: input
    actions: [get, set, type, paste, press]
    value_type: string
  - name: ready_only_checkbox
    kind: checkbox
    actions: [get, set]
    value_type: boolean
  - name: refresh_button
    kind: button
    actions: [click]
  - name: redeem_primary_button
    kind: button
    actions: [click]
  - name: status_text
    kind: text
    actions: [get, wait, copy]
  - name: list_container
    kind: container
    actions: [get, wait, copy]
