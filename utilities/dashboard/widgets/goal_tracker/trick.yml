type: widget
name: goal_tracker
label: Goals
module: goal_tracker
root: widget.goal_tracker
elements:
  - name: title
    kind: text
    actions: [get]
  - name: minimize_button
    kind: button
    actions: [click]
  - name: close_button
    kind: button
    actions: [click]
  - name: search_input
    kind: input
    actions: [get, set, type, paste, press]
    value_type: string
  - name: search_button
    kind: button
    actions: [click]
  - name: recalc_button
    kind: button
    actions: [click]
  - name: refresh_button
    kind: button
    actions: [click]
  - name: list_container
    kind: container
    actions: [get, wait, copy]
  - name: goal_list
    kind: container
    actions: [get, wait, copy]
  - name: goal_title_text
    kind: text
    actions: [get, set, wait, copy]
  - name: goal_progress_bar
    kind: text
    actions: [get, wait]
  - name: goal_meta_text
    kind: text
    actions: [get, wait, copy]
  - name: complete_primary_button
    kind: button
    actions: [click]
  - name: focus_primary_button
    kind: button
    actions: [click]
  - name: milestones_container
    kind: container
    actions: [get, wait, copy]
  - name: status_text
    kind: text
    actions: [get, wait, copy]
