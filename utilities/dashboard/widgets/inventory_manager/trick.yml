  - name: new_places_input
    kind: input
    actions: [get, set, type, paste, press]
    value_type: string
  - name: new_tags_input
    kind: input
    actions: [get, set, type, paste, press]
    value_type: string
  - name: create_button
    kind: button
    actions: [click]
  - name: count_text
    kind: text
