<div class="header" data-ui-id="widget.profile.header">
  <span class="title" data-ui-id="widget.profile.title">Profile</span>
  <div class="controls">
    <button class="icon-btn" id="profileMin" title="Minimize" data-ui-id="widget.profile.minimize_button">_</button>
    <button class="icon-btn" id="profileClose" title="Close" data-ui-id="widget.profile.close_button">✖</button>
  </div>
</div>
<div class="content profile-layout">
  <div class="profile-pane profile-pane-left">
    <section class="profile-card">
      <h3 class="profile-card-title">Identity</h3>
      <div class="row">
        <label for="nickname">Nickname</label>
        <input type="text" id="nickname" class="input" data-ui-id="widget.profile.nickname_input">
      </div>
      <div class="row">
        <label for="profile-title">Title</label>
        <select id="profile-title" class="input" data-ui-id="widget.profile.title_select">
          <option value="">No unlocked titles</option>
        </select>
      </div>
      <div class="row">
        <label>Avatar</label>
        <div class="profile-avatar-controls" data-ui-id="widget.profile.avatar_section">
          <div id="avatar-preview" class="profile-avatar-preview" data-ui-id="widget.profile.avatar_preview"></div>
          <div class="profile-avatar-actions">
            <button id="change-avatar" class="btn" data-ui-id="widget.profile.change_avatar_button">Change Avatar</button>
            <input id="avatar-file" type="file" accept="image/*" style="display:none;">
          </div>
        </div>
      </div>
    </section>
  </div>
  <div class="profile-pane profile-pane-right">
    <section class="profile-card">
      <h3 class="profile-card-title">Messages</h3>
      <div class="profile-subtitle">Welcome</div>
      <input type="text" id="welcome-line1" class="input" placeholder="Line 1" data-ui-id="widget.profile.welcome_line1_input">
      <input type="text" id="welcome-line2" class="input" placeholder="Line 2" data-ui-id="widget.profile.welcome_line2_input">
      <input type="text" id="welcome-line3" class="input" placeholder="Line 3" data-ui-id="widget.profile.welcome_line3_input">

      <div class="profile-subtitle">Exit</div>
      <input type="text" id="exit-line1" class="input" placeholder="Line 1" data-ui-id="widget.profile.exit_line1_input">
      <input type="text" id="exit-line2" class="input" placeholder="Line 2" data-ui-id="widget.profile.exit_line2_input">
    </section>
  </div>
  <div class="profile-pane profile-pane-bottom">
    <section class="profile-card">
      <h3 class="profile-card-title">Actions</h3>
      <div class="profile-actions">
        <button id="save-profile" class="btn btn-primary" data-ui-id="widget.profile.save_button">Save Changes</button>
        <button id="edit-preferences-md" class="btn" data-ui-id="widget.profile.edit_preferences_button">Edit Agent Preferences</button>
        <button id="edit-preferences-settings" class="btn" data-ui-id="widget.profile.edit_preferences_settings_button">Edit Preferences Settings</button>
        <button id="edit-pilot-brief" class="btn" data-ui-id="widget.profile.edit_pilot_brief_button">Edit Pilot Brief</button>
      </div>
      <div class="hint" id="profile-status" data-ui-id="widget.profile.status_text"></div>
    </section>
  </div>
  <div class="resizer e"></div>
  <div class="resizer s"></div>
  <div class="resizer se"></div>
</div>
