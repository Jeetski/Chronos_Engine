type: widget
name: commitments
label: Commitments
module: commitments
root: widget.commitments
elements:
  - name: title
    kind: text
    actions: [get]
  - name: evaluate_button
    kind: button
    actions: [click]
  - name: minimize_button
    kind: button
    actions: [click]
  - name: close_button
    kind: button
    actions: [click]
  - name: total_text
    kind: text
    actions: [get, wait, copy]
  - name: met_text
    kind: text
    actions: [get, wait, copy]
  - name: violations_text
    kind: text
    actions: [get, wait, copy]
  - name: list_toggle_button
    kind: button
    actions: [click]
  - name: list_section
    kind: container
    actions: [get, wait]
  - name: search_input
    kind: input
    actions: [get, set, type, paste, press]
    value_type: string
  - name: status_filter_select
    kind: select
    actions: [get, set, type, paste, press]
    value_type: string
  - name: refresh_button
    kind: button
    actions: [click]
  - name: met_primary_button
    kind: button
    actions: [click]
  - name: violation_primary_button
    kind: button
    actions: [click]
  - name: clear_primary_button
    kind: button
    actions: [click]
  - name: status_text
    kind: text
    actions: [get, wait, copy]
  - name: list_container
    kind: container
    actions: [get, wait, copy]
