type: widget
name: sticky_notes
label: Sticky Notes
module: sticky_notes
root: widget.sticky_notes
elements:
  - name: title
    kind: text
    actions: [get]
  - name: refresh_button
    kind: button
    actions: [click]
  - name: minimize_button
    kind: button
    actions: [click]
  - name: close_button
    kind: button
    actions: [click]
  - name: new_content_input
    kind: input
    actions: [get, set, type, paste]
    value_type: string
  - name: new_color_select
    kind: select
    actions: [get, set, type, paste]
    value_type: string
  - name: create_button
    kind: button
    actions: [click]
  - name: notes_container
    kind: container
    actions: [get, wait, copy]
  - name: status_text
    kind: text
    actions: [get, wait, copy]
