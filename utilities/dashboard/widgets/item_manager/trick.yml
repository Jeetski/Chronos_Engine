type: widget
name: item_manager
label: Item Manager
module: item_manager
root: widget.item_manager
elements:
  - name: title
    kind: text
    actions: [get]
  - name: minimize_button
    kind: button
    actions: [click]
  - name: close_button
    kind: button
    actions: [click]
  - name: type_select
    kind: select
    actions: [get, set, type, paste]
    value_type: string
  - name: search_input
    kind: input
    actions: [get, set, type, paste, press]
    value_type: string
  - name: search_button
    kind: button
    actions: [click]
  - name: refresh_button
    kind: button
    actions: [click]
  - name: new_button
    kind: button
    actions: [click]
  - name: count_text
    kind: text
    actions: [get, wait, copy]
  - name: list_container
    kind: container
    actions: [get, wait, copy]
  - name: item_name_input
    kind: input
    actions: [get, set, type, paste, press]
    value_type: string
  - name: yaml_input
    kind: input
    actions: [get, set, type, paste, copy, press]
    value_type: string
  - name: save_button
    kind: button
    actions: [click]
  - name: copy_button
    kind: button
    actions: [click]
  - name: rename_button
    kind: button
    actions: [click]
  - name: delete_button
    kind: button
    actions: [click]
  - name: status_text
    kind: text
    actions: [get, wait, copy]
