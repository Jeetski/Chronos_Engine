type: widget
name: milestones
label: Milestones
module: milestones
root: widget.milestones
elements:
  - name: title
    kind: text
    actions: [get]
  - name: minimize_button
    kind: button
    actions: [click]
  - name: close_button
    kind: button
    actions: [click]
  - name: total_text
    kind: text
    actions: [get, wait, copy]
  - name: completed_text
    kind: text
    actions: [get, wait, copy]
  - name: in_progress_text
    kind: text
    actions: [get, wait, copy]
  - name: list_toggle_button
    kind: button
    actions: [click]
  - name: list_section
    kind: container
    actions: [get, wait]
  - name: search_input
    kind: input
    actions: [get, set, type, paste, press]
    value_type: string
  - name: status_filter_select
    kind: select
    actions: [get, set, type, paste]
    value_type: string
  - name: project_filter_select
    kind: select
    actions: [get, set, type, paste]
    value_type: string
  - name: goal_filter_select
    kind: select
    actions: [get, set, type, paste]
    value_type: string
  - name: refresh_button
    kind: button
    actions: [click]
  - name: complete_primary_button
    kind: button
    actions: [click]
  - name: reset_primary_button
    kind: button
    actions: [click]
  - name: status_text
    kind: text
    actions: [get, wait, copy]
  - name: list_container
    kind: container
    actions: [get, wait, copy]
