<div class="header">
  <span class="title">Profile</span>
  <div class="controls">
    <button class="icon-btn" id="profileClose" title="Close">✖</button>
  </div>
</div>
<div class="content profile-layout">
  <div class="profile-pane profile-pane-left">
    <section class="profile-card">
      <h3 class="profile-card-title">Identity</h3>
      <div class="row">
        <label for="nickname">Nickname</label>
        <input type="text" id="nickname" class="input">
      </div>
      <div class="row">
        <label for="profile-title">Title</label>
        <select id="profile-title" class="input">
          <option value="">No unlocked titles</option>
        </select>
      </div>
      <div class="row">
        <label>Avatar</label>
        <div class="profile-avatar-controls">
          <div id="avatar-preview" class="profile-avatar-preview"></div>
          <div class="profile-avatar-actions">
            <button id="change-avatar" class="btn">Change Avatar</button>
            <input id="avatar-file" type="file" accept="image/*" style="display:none;">
          </div>
        </div>
      </div>
    </section>
  </div>
  <div class="profile-pane profile-pane-right">
    <section class="profile-card">
      <h3 class="profile-card-title">Messages</h3>
      <div class="profile-subtitle">Welcome</div>
      <input type="text" id="welcome-line1" class="input" placeholder="Line 1">
      <input type="text" id="welcome-line2" class="input" placeholder="Line 2">
      <input type="text" id="welcome-line3" class="input" placeholder="Line 3">

      <div class="profile-subtitle">Exit</div>
      <input type="text" id="exit-line1" class="input" placeholder="Line 1">
      <input type="text" id="exit-line2" class="input" placeholder="Line 2">
    </section>
  </div>
  <div class="profile-pane profile-pane-bottom">
    <section class="profile-card">
      <h3 class="profile-card-title">Actions</h3>
      <div class="profile-actions">
        <button id="save-profile" class="btn btn-primary">Save Changes</button>
        <button id="edit-preferences-md" class="btn">Edit Agent Preferences</button>
        <button id="edit-preferences-settings" class="btn">Edit Preferences Settings</button>
        <button id="edit-pilot-brief" class="btn">Edit Pilot Brief</button>
      </div>
    </section>
  </div>
  <div class="resizer e"></div>
  <div class="resizer s"></div>
  <div class="resizer se"></div>
</div>
